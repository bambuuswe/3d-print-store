<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAFTERS 3D | Block-Print Atelier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        /* --- MINECRAFT DESIGN SYSTEM --- */
        :root {
            --mc-stone: #7D7D7D;
            --mc-stone-light: #9E9E9E;
            --mc-stone-dark: #555555;
            --mc-gui-bg: #C6C6C6;
            --mc-gui-border-light: #FFFFFF;
            --mc-gui-border-dark: #555555;
            --mc-slot-bg: #8B8B8B;
            --mc-slot-dark: #373737;
            --mc-text: #3F3F3F;
            --mc-text-shadow: #222222;
            --mc-yellow: #FFFF55;
            --mc-green: #55FF55;
            --mc-red: #FF5555;
            --mc-blue: #5555FF;
            --mc-hover: #7BA4FF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            /* Stone texture simulation */
            background-color: var(--mc-stone);
            background-image: 
                linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%, rgba(0,0,0,0.05)),
                linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%, rgba(0,0,0,0.05));
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
            color: #FFFFFF;
            font-family: 'VT323', monospace; /* Blocky but readable */
            line-height: 1.4;
            overflow-x: hidden;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.7);
        }

        h1, h2, h3, .btn, .mc-font {
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
        }

        .container { width: min(1200px, 92vw); margin: 0 auto; }

        /* --- GUI MIXINS --- */
        .gui-panel {
            background-color: var(--mc-gui-bg);
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px var(--mc-gui-border-light), 
                        inset -4px -4px 0px var(--mc-gui-border-dark);
            color: var(--mc-text);
            text-shadow: none;
        }

        .gui-slot {
            background-color: var(--mc-slot-bg);
            box-shadow: inset 4px 4px 0px var(--mc-slot-dark), 
                        inset -4px -4px 0px var(--mc-gui-border-light);
            display: grid; place-items: center;
        }

        .mc-button {
            background-color: var(--mc-slot-bg);
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px var(--mc-gui-border-light), 
                        inset -4px -4px 0px var(--mc-gui-border-dark);
            color: #FFF;
            text-shadow: 2px 2px 0px var(--mc-text-shadow);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            padding: 1rem 2rem;
            display: inline-block;
            text-align: center;
        }

        .mc-button:hover {
            background-color: var(--mc-hover);
            color: var(--mc-yellow);
            box-shadow: inset 4px 4px 0px #AACCFF, 
                        inset -4px -4px 0px #3355AA;
        }
        
        .mc-button:active {
            box-shadow: inset 4px 4px 0px var(--mc-gui-border-dark), 
                        inset -4px -4px 0px var(--mc-gui-border-light);
            padding: 1.1rem 1.9rem 0.9rem 2.1rem; /* Simulate press */
        }

        /* --- HEADER / HOTBAR --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 50;
            padding: 1rem 0; display: flex; justify-content: center;
            pointer-events: none;
        }

        .hotbar {
            display: flex; gap: 4px; pointer-events: auto;
            background: rgba(0,0,0,0.5); padding: 4px;
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px rgba(255,255,255,0.2),
                        inset -4px -4px 0px rgba(0,0,0,0.5);
        }

        .hotbar-slot {
            width: 50px; height: 50px;
            background-color: var(--mc-slot-bg);
            box-shadow: inset 4px 4px 0px var(--mc-slot-dark), 
                        inset -4px -4px 0px var(--mc-gui-border-light);
            display: grid; place-items: center;
            font-size: 1.5rem; position: relative;
            cursor: crosshair; transition: all 0.1s;
        }

        .hotbar-slot.active {
            border: 4px solid #FFF;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            transform: scale(1.1); z-index: 2;
        }

        .hotbar-slot:hover { background-color: var(--mc-stone-light); }

        .hotbar-count {
            position: absolute; bottom: 0; right: 4px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem; text-shadow: 2px 2px 0px #000;
        }

        /* --- HERO --- */
        .hero {
            min-height: 70vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding-top: 6rem;
        }

        .mc-title {
            font-size: clamp(2rem, 6vw, 5rem);
            color: var(--mc-stone-light);
            text-shadow: 
                4px 4px 0 #000,
                -2px -2px 0 var(--mc-gui-border-light),
                0 6px 0px rgba(0,0,0,0.5);
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        .mc-subtitle {
            font-size: 1.8rem; color: var(--mc-yellow);
            text-shadow: 2px 2px 0px #000;
        }

        /* --- PRODUCT GRID --- */
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem; padding: 4rem 0 8rem;
        }

        .product-block {
            background-color: var(--mc-stone-dark);
            border: 4px solid #000;
            padding: 4px;
            position: relative; transition: transform 0.2s;
        }

        /* Simulate Minecraft block outline on hover */
        .product-block::after {
            content: ''; position: absolute; inset: -4px;
            border: 4px solid transparent; z-index: 10; pointer-events: none;
        }
        .product-block:hover::after { border-color: rgba(0, 0, 0, 0.8); }
        .product-block:hover { transform: translateY(-4px); }

        .product-visual {
            background-color: var(--mc-gui-bg);
            height: 200px; display: grid; place-items: center;
            box-shadow: inset 4px 4px 0px var(--mc-gui-border-light), 
                        inset -4px -4px 0px var(--mc-gui-border-dark);
            margin-bottom: 4px; position: relative; overflow: hidden;
        }

        .floating-item {
            font-size: 5rem; text-shadow: 4px 4px 0px rgba(0,0,0,0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .badge-mc {
            position: absolute; top: 8px; left: 8px;
            background: #000; color: var(--mc-yellow);
            font-family: 'Press Start 2P', cursive; font-size: 0.5rem;
            padding: 4px 8px; border: 2px solid var(--mc-gui-border-dark);
        }

        .product-info {
            background-color: rgba(0,0,0,0.7);
            padding: 1rem; border: 2px solid #000;
        }

        .product-name {
            font-size: 0.9rem; color: var(--mc-green); margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .product-lore {
            font-size: 1.2rem; color: #AAAAAA; margin-bottom: 1rem;
        }

        .product-bottom {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 2px solid #333; padding-top: 1rem;
        }

        .emerald-price {
            display: flex; align-items: center; gap: 8px;
            font-family: 'Press Start 2P', cursive; font-size: 0.8rem;
            color: #FFF;
        }

        /* --- INVENTORY (CART) --- */
        .cart-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 100; opacity: 0; pointer-events: none;
            display: grid; place-items: center;
        }
        .cart-overlay.active { opacity: 1; pointer-events: auto; }

        .chest-gui {
            width: min(500px, 95vw); max-height: 90vh;
            display: flex; flex-direction: column;
            transform: scale(0.9); transition: transform 0.2s;
        }
        .cart-overlay.active .chest-gui { transform: scale(1); }

        .gui-header {
            display: flex; justify-content: space-between; padding: 1rem;
            border-bottom: 4px solid var(--mc-gui-border-dark);
        }

        .gui-title {
            font-family: 'VT323', monospace; font-size: 2rem; color: var(--mc-text); text-shadow: none;
        }

        .gui-close {
            background: none; border: none; color: var(--mc-text);
            font-family: 'Press Start 2P', cursive; font-size: 1.2rem;
            text-shadow: 2px 2px 0px var(--mc-gui-border-light);
        }

        .gui-body {
            padding: 1rem; flex: 1; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
        }

        .inv-row {
            display: flex; gap: 8px; align-items: center;
        }

        .inv-slot { width: 48px; height: 48px; flex-shrink: 0; font-size: 1.5rem; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); }
        
        .inv-details {
            flex: 1; color: var(--mc-text); text-shadow: none; font-size: 1.4rem; line-height: 1;
        }
        .inv-details strong { font-family: 'Press Start 2P', cursive; font-size: 0.6rem; display: block; margin-bottom: 4px; color: #000; }

        .qty-controls { display: flex; gap: 4px; }
        .qty-btn {
            width: 24px; height: 24px; font-family: 'Press Start 2P', cursive; font-size: 0.6rem;
            padding: 0; display: grid; place-items: center;
        }

        .gui-footer {
            padding: 1rem; border-top: 4px solid var(--mc-gui-border-light);
            display: flex; flex-direction: column; gap: 1rem;
        }

        .xp-bar-container {
            width: 100%; height: 16px; background: #000;
            border: 2px solid #000; position: relative;
        }
        .xp-bar-fill {
            height: 100%; background: #55FF55; width: 0%;
            border-top: 2px solid #AFFFFA; border-bottom: 2px solid #00AA00;
            transition: width 0.3s;
        }
        .xp-level {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            font-family: 'Press Start 2P', cursive; font-size: 1rem;
            color: #55FF55; text-shadow: 2px 2px 0px #000;
        }

        .total-row {
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: #000; text-shadow: none;
        }

        /* --- TOAST --- */
        .toast-advancement {
            position: fixed; top: -100px; right: 20px; z-index: 200;
            background-color: #212121; border: 4px solid #555555;
            box-shadow: inset 4px 4px 0px #7D7D7D, inset -4px -4px 0px #111111;
            padding: 1rem; display: flex; gap: 1rem; align-items: center;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-advancement.show { top: 20px; }
        
        .adv-icon { font-size: 2rem; text-shadow: 2px 2px 0px #000; }
        .adv-text { font-family: 'VT323', monospace; }
        .adv-title { color: #FFFF55; font-size: 1.4rem; line-height: 1; }
        .adv-desc { color: #FFFFFF; font-size: 1.2rem; text-shadow: 2px 2px 0px #000; }

    </style>
</head>
<body>

    <!-- HOTBAR (Navigation) -->
    <header>
        <div class="hotbar" id="hotbar">
            <!-- Logo Slot -->
            <div class="hotbar-slot" title="Hemsida" onclick="window.scrollTo(0,0)">
                <span style="font-size: 1rem; font-family: 'Press Start 2P'; color:#55FF55;">C3D</span>
            </div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <!-- Cart Slot -->
            <div class="hotbar-slot active" title="Öppna Kista (Varukorg)" onclick="toggleInventory(true)">
                🧰
                <span class="hotbar-count" id="hotbar-qty">0</span>
            </div>
        </div>
    </header>

    <main>
        <section class="hero container">
            <h1 class="mc-title">CRAFTERS 3D</h1>
            <p class="mc-subtitle">Premium block-prints for your base.</p>
            <div style="margin-top: 3rem;">
                <button class="mc-button" onclick="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})">
                    Start Crafting
                </button>
            </div>
        </section>

        <section class="container" id="shop">
            <h2 class="mc-font" style="color:#FFF; border-bottom: 4px solid var(--mc-stone-light); padding-bottom:1rem; margin-bottom: 1rem;">Recipe Book</h2>
            <div class="product-grid" id="product-grid">
                <!-- Products injected via JS -->
            </div>
        </section>
    </main>

    <!-- INVENTORY GUI (Cart) -->
    <div class="cart-overlay" id="inv-overlay" onclick="if(event.target===this) toggleInventory(false)">
        <div class="gui-panel chest-gui">
            <div class="gui-header">
                <h3 class="gui-title">Inventory (Chest)</h3>
                <button class="gui-close" onclick="toggleInventory(false)">X</button>
            </div>
            
            <div class="gui-body" id="inv-items">
                <!-- Cart items -->
            </div>

            <div class="gui-footer">
                <div style="position: relative; margin-bottom: 1rem;">
                    <div class="xp-level" id="xp-level">0</div>
                    <div class="xp-bar-container">
                        <div class="xp-bar-fill" id="xp-bar"></div>
                    </div>
                </div>

                <div class="total-row">
                    <span>TOTAL COST:</span>
                    <span style="display:flex; align-items:center; gap:8px;">
                        <span style="font-size:1.5rem; text-shadow:2px 2px 0px rgba(0,0,0,0.3)">💎</span> 
                        <span id="inv-total">0</span>
                    </span>
                </div>
                
                <button class="mc-button" id="checkout-btn" style="width:100%; margin-top:0.5rem;" onclick="checkout()">
                    TRADE ITEMS
                </button>
            </div>
        </div>
    </div>

    <!-- ADVANCEMENT TOAST -->
    <div class="toast-advancement" id="toast">
        <div class="adv-icon">⭐</div>
        <div class="adv-text">
            <div class="adv-title">Advancement Made!</div>
            <div class="adv-desc" id="toast-desc">Item added to inventory.</div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const products = [
            {
                id: 'blk_vessel',
                name: 'Vortex Vessel Block',
                price: 12,
                emoji: '🏺',
                lore: 'A spiraling vase crafted from rare Obsidian PLA. Holds water and flowers.',
                rarity: 'Epic',
                rarityColor: '#AA00AA' // Purple
            },
            {
                id: 'blk_lunar',
                name: 'Lunar Monolith',
                price: 24,
                emoji: '🌕',
                lore: 'Emits a light level of 15. Powered by Glow-Core Composite material.',
                rarity: 'Legendary',
                rarityColor: '#FFAA00' // Gold
            },
            {
                id: 'blk_orb',
                name: 'Kinetic Redstone Orb',
                price: 8,
                emoji: '⚙️',
                lore: 'Print-in-place mechanical gears. Good for testing redstone ticks.',
                rarity: 'Uncommon',
                rarityColor: '#55FF55' // Green
            },
            {
                id: 'blk_panda',
                name: 'Slime Panda',
                price: 5,
                emoji: '🐼',
                lore: 'A low-poly companion entity. Does not require bamboo to survive.',
                rarity: 'Common',
                rarityColor: '#FFFFFF' // White
            },
            {
                id: 'blk_stand',
                name: 'Bedrock Headset Stand',
                price: 15,
                emoji: '🎧',
                lore: 'Indestructible mount for your communication devices.',
                rarity: 'Rare',
                rarityColor: '#5555FF' // Blue
            }
        ];

        let inventory = [];

        // --- RENDER SHOP ---
        const renderShop = () => {
            const grid = document.getElementById('product-grid');
            
            grid.innerHTML = products.map((p) => {
                const badge = `<div class="badge-mc" style="color:${p.rarityColor}; border-color:${p.rarityColor}">${p.rarity}</div>`;
                
                return `
                    <article class="product-block">
                        <div class="product-visual">
                            ${badge}
                            <div class="floating-item">${p.emoji}</div>
                        </div>
                        <div class="product-info">
                            <h3 class="mc-font product-name" style="color:${p.rarityColor}">${p.name}</h3>
                            <p class="product-lore">"${p.lore}"</p>
                            <div class="product-bottom">
                                <span class="emerald-price">
                                    <span style="font-size:1.2rem; text-shadow:2px 2px 0px #000">💎</span> ${p.price}
                                </span>
                                <button class="mc-button" style="padding: 0.8rem 1rem; font-size:0.6rem;" onclick="addToInventory('${p.id}')">
                                    MINE
                                </button>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        };

        // --- INVENTORY LOGIC ---
        const addToInventory = (id) => {
            const product = products.find(p => p.id === id);
            const existing = inventory.find(item => item.id === id);
            
            if (existing) {
                if(existing.quantity < 64) existing.quantity++;
                else { showToast('Stack limit (64) reached!'); return; }
            } else {
                inventory.push({ ...product, quantity: 1 });
            }
            
            updateInventoryUI();
            showToast(`${product.name} acquired!`);
        };

        const updateQty = (id, delta) => {
            const item = inventory.find(i => i.id === id);
            if (!item) return;
            
            item.quantity += delta;
            if (item.quantity <= 0) inventory = inventory.filter(i => i.id !== id);
            if (item.quantity > 64) item.quantity = 64;
            
            updateInventoryUI();
        };

        const updateInventoryUI = () => {
            const container = document.getElementById('inv-items');
            const totalEl = document.getElementById('inv-total');
            const hotbarQty = document.getElementById('hotbar-qty');
            const btn = document.getElementById('checkout-btn');
            const xpBar = document.getElementById('xp-bar');
            const xpLevel = document.getElementById('xp-level');

            const totalItems = inventory.reduce((s, i) => s + i.quantity, 0);
            const totalCost = inventory.reduce((s, i) => s + (i.price * i.quantity), 0);

            hotbarQty.textContent = totalItems;
            totalEl.textContent = totalCost;
            
            // XP Bar logic (just for fun visuals)
            xpLevel.textContent = totalCost;
            const xpPercent = Math.min((totalCost % 64) / 64 * 100, 100);
            xpBar.style.width = `${xpPercent}%`;

            if (inventory.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding: 2rem 0;">Chest is empty.</p>';
                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';
                return;
            }

            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';
            
            container.innerHTML = inventory.map(i => `
                <div class="inv-row">
                    <div class="gui-slot inv-slot">
                        <div style="position:relative;">
                            ${i.emoji}
                            <span style="position:absolute; bottom:-10px; right:-10px; font-family:'Press Start 2P'; font-size:0.6rem; color:#FFF; text-shadow:2px 2px 0px #000;">
                                ${i.quantity}
                            </span>
                        </div>
                    </div>
                    <div class="inv-details">
                        <strong style="color:${i.rarityColor}">${i.name}</strong>
                        <span style="font-size:1.2rem;">Cost: 💎 ${i.price * i.quantity}</span>
                    </div>
                    <div class="qty-controls">
                        <button class="mc-button qty-btn" onclick="updateQty('${i.id}', -1)">-</button>
                        <button class="mc-button qty-btn" onclick="updateQty('${i.id}', 1)">+</button>
                    </div>
                </div>
            `).join('');
        };

        const toggleInventory = (state) => {
            const overlay = document.getElementById('inv-overlay');
            if (state) {
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        };

        const checkout = () => {
            alert('Villagers are pleased with this trade. Connecting to server...');
            inventory = [];
            updateInventoryUI();
            toggleInventory(false);
        };

        const showToast = (desc) => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-desc').textContent = desc;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderShop();
            updateInventoryUI();
        });
    </script>
</body>
</html>
