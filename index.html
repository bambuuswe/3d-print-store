<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafters3D - Premium 3D Utskrifter</title>
    <style>
        :root {
            --bg: #060a12;
            --panel: rgba(12, 18, 30, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(255, 255, 255, 0.15);
            --text-main: #f6f2e9;
            --text-muted: #9aa0a6;
            --accent: #f3b23a;
            --accent-soft: #7dd3fc;
            --success: #58d08b;
            --blur: blur(16px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            line-height: 1.6; overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 0%, rgba(125, 211, 252, 0.08), transparent 40%),
                        radial-gradient(circle at 80% 40%, rgba(243, 178, 58, 0.05), transparent 30%);
            z-index: -2; animation: slowRotate 60s linear infinite; pointer-events: none;
        }

        body::after {
            content: ""; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100V0h100' fill='none' stroke='rgba(255,255,255,0.02)' stroke-width='1'/%3E%3C/svg%3E");
            background-size: 50px 50px; opacity: 0.5; z-index: -3; pointer-events: none;
        }

        @keyframes slowRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { width: min(1200px, 92%); margin: 0 auto; }
        
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 40;
            background: rgba(6, 10, 18, 0.8); backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border);
        }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; }
        .logo {
            font-size: 1.5rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-cart {
            display: inline-flex; align-items: center; gap: 0.6rem;
            border: 1px solid var(--border); padding: 0.4rem 1.2rem;
            border-radius: 999px; background: rgba(255, 255, 255, 0.03);
            cursor: pointer; font-weight: 600; color: var(--text-main); transition: all 0.3s;
        }
        .nav-cart:hover { border-color: var(--border-glow); background: rgba(255, 255, 255, 0.08); }
        .badge-count {
            background: var(--accent-soft); color: #041022; min-width: 1.5rem; height: 1.5rem;
            border-radius: 999px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 800;
        }

        .hero { padding: 9rem 0 4rem; text-align: center; }
        .hero h1 { font-size: clamp(2.5rem, 5vw, 4.5rem); margin-bottom: 1rem; line-height: 1.1; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem; padding-bottom: 6rem;
        }

        .product-card {
            background: var(--panel); border-radius: 1.2rem; border: 1px solid var(--border);
            padding: 1.2rem; display: flex; flex-direction: column; position: relative;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); backdrop-filter: blur(10px);
        }
        .product-card:hover {
            transform: translateY(-8px); border-color: var(--card-accent);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 30px var(--card-accent-alpha);
        }

        .product-media {
            height: 250px; border-radius: 0.8rem; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.2rem; position: relative; overflow: hidden;
            background-size: cover; background-position: center;
        }
        
        .badge {
            position: absolute; top: 0.8rem; left: 0.8rem; padding: 0.3rem 0.8rem;
            border-radius: 999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px);
            border: 1px solid var(--card-accent); color: #fff; z-index: 2;
        }

        .product-specs {
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.15em;
            color: var(--card-accent); font-weight: 700; margin-bottom: 0.4rem;
        }
        .product-card h3 { font-size: 1.4rem; margin-bottom: 0.4rem; }
        .product-desc { color: var(--text-muted); font-size: 0.95rem; flex-grow: 1; margin-bottom: 1.5rem; }

        .product-bottom {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.2rem;
        }
        .price-tag { font-size: 1.4rem; font-weight: 800; }
        
        .btn-add {
            border: 1px solid rgba(255,255,255,0.2); border-radius: 999px;
            background: transparent; color: #fff; padding: 0.6rem 1.4rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-add:hover { background: var(--card-accent); color: #000; border-color: var(--card-accent); }

        .cart-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 100;
        }
        .cart-overlay.visible { opacity: 1; pointer-events: all; }
        .cart-panel {
            position: fixed; top: 0; right: -100%; width: min(400px, 100%); height: 100vh;
            background: rgba(10, 14, 24, 0.98); border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 101; display: flex; flex-direction: column; transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cart-panel.open { right: 0; }
        .cart-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .close-cart { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .cart-body { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .cart-item { display: flex; gap: 1rem; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.8rem; border: 1px solid var(--border); }
        .cart-avatar { width: 60px; height: 60px; border-radius: 0.5rem; background-size: cover; background-position: center; background-color: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .cart-meta { flex: 1; }
        .qty-controls { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
        .qty-btn { width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; }
        .cart-footer { padding: 1.5rem; border-top: 1px solid var(--border); background: rgba(0,0,0,0.3); }
        
        .btn-checkout {
            width: 100%; background: linear-gradient(135deg, var(--success), #22c55e); color: #000;
            border: none; padding: 1rem; border-radius: 0.5rem; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: transform 0.2s;
        }

        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translate(-50%, 50px);
            background: #fff; color: #000; padding: 0.8rem 1.5rem; border-radius: 999px;
            font-weight: 700; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 200;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }
    </style>
</head>
<body>

    <header>
        <div class="container nav">
            <div class="logo">Crafters3D</div>
            <button class="nav-cart" onclick="toggleCart(true)">
                🛒 Varukorg <span class="badge-count" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <section class="hero container">
            <h1>Vi väcker plast till liv.</h1>
            <p>Utforska vår kurerade kollektion av taktila, cinematiska 3D-utskrifter för din arbetsyta.</p>
        </section>

        <section class="container">
            <div class="product-grid" id="product-grid"></div>
        </section>
    </main>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart(false)"></div>
    <aside class="cart-panel" id="cart-panel">
        <div class="cart-header">
            <h3>Din Varukorg</h3>
            <button class="close-cart" onclick="toggleCart(false)">✕</button>
        </div>
        <div class="cart-body" id="cart-items"></div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 1rem;">
                <span>Totalt</span>
                <strong id="cart-total">0 kr</strong>
            </div>
            <button class="btn-checkout" id="checkout-btn" onclick="checkout()">Till Kassan</button>
        </div>
    </aside>

    <div class="toast" id="toast">Tillagd i varukorgen</div>

    <script>
        const products = [
            {
                id: 'prod_exempel1',
                name: 'Lunar Bordslampa',
                price: 499,
                image: '', 
                description: 'Otroligt detaljerad yta baserad på NASA-skanningar.',
                specs: 'Glow-in-dark PLA',
                accent: '#f3b23a',
                badge: 'Limiterad'
            },
            {
                id: 'prod_exempel2',
                name: 'Hörlursställ Monolith',
                price: 299,
                image: '', 
                description: 'Tungt, stabilt och minimalistiskt designat.',
                specs: 'Kolfiber-PLA · 25cm',
                accent: '#a78bfa',
                badge: ''
            }
        ];

        let cart = [];

        const formatPrice = (price) => new Intl.NumberFormat('sv-SE', { style: 'currency', currency: 'SEK', maximumFractionDigits: 0 }).format(price);
        const hexToRgba = (hex, alpha) => {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        const renderProducts = () => {
            const grid = document.getElementById('product-grid');
            if (products.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color: var(--text-muted);">Kollektionen är tom.</p>';
                return;
            }

            grid.innerHTML = products.map(p => {
                const badgeHtml = p.badge ? `<div class="badge">${p.badge}</div>` : '';
                const visualHtml = p.image 
                    ? `<div class="product-media" style="background-image: url('${p.image}'); border-color: ${p.accent}40;">${badgeHtml}</div>`
                    : `<div class="product-media" style="background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,0,0,0.5)); border-color: ${p.accent}40;">${badgeHtml}<span style="font-size:3rem; opacity:0.5;">📦</span></div>`;

                return `
                    <article class="product-card" style="--card-accent: ${p.accent}; --card-accent-alpha: ${hexToRgba(p.accent, 0.15)};">
                        ${visualHtml}
                        <p class="product-specs">${p.specs || 'Standard PLA'}</p>
                        <h3>${p.name}</h3>
                        <p class="product-desc">${p.description}</p>
                        <div class="product-bottom">
                            <span class="price-tag">${formatPrice(p.price)}</span>
                            <button class="btn-add" onclick="addToCart('${p.id}')">Köp Nu</button>
                        </div>
                    </article>
                `;
            }).join('');
        };

        const addToCart = (id) => {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            if (existing) existing.quantity++;
            else cart.push({ ...product, quantity: 1 });
            
            updateCartUI();
            
            const toast = document.getElementById('toast');
            toast.textContent = `🛒 ${product.name} lades till`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        };

        const updateCartQty = (id, delta) => {
            const item = cart.find(i => i.id === id);
            if (!item) return;
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
            updateCartUI();
        };

        const updateCartUI = () => {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const badge = document.getElementById('cart-count');
            const btn = document.getElementById('checkout-btn');

            const totalQty = cart.reduce((s, i) => s + i.quantity, 0);
            const totalSum = cart.reduce((s, i) => s + (i.price * i.quantity), 0);

            badge.textContent = totalQty;
            totalEl.textContent = formatPrice(totalSum);

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:2rem;">Varukorgen är tom</p>';
                btn.disabled = true; btn.style.opacity = '0.5';
                return;
            }

            btn.disabled = false; btn.style.opacity = '1';
            
            container.innerHTML = cart.map(i => {
                const thumbStyle = i.image ? `background-image: url('${i.image}')` : `background: linear-gradient(135deg, #222, #111)`;
                return `
                <div class="cart-item">
                    <div class="cart-avatar" style="${thumbStyle}; border-color:${i.accent}40;"></div>
                    <div class="cart-meta">
                        <strong>${i.name}</strong><br>
                        <small style="color:var(--text-muted)">${formatPrice(i.price)}</small>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateCartQty('${i.id}', -1)">-</button>
                            <span>${i.quantity}</span>
                            <button class="qty-btn" onclick="updateCartQty('${i.id}', 1)">+</button>
                        </div>
                    </div>
                    <div style="font-weight:700;">${formatPrice(i.price * i.quantity)}</div>
                </div>
            `}).join('');
        };

        const toggleCart = (state) => {
            const panel = document.getElementById('cart-panel');
            const overlay = document.getElementById('cart-overlay');
            const isOpen = panel.classList.contains('open');
            const shouldOpen = typeof state === 'boolean' ? state : !isOpen;
            
            panel.classList.toggle('open', shouldOpen);
            overlay.classList.toggle('visible', shouldOpen);
        };

        const checkout = () => {
            alert('Detta är en simulation. Kassan öppnas!');
        };

        renderProducts();
        updateCartUI();
    </script>
</body>
</html>
