<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafters3D | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .header h1 { font-weight: 900; letter-spacing: -0.03em; }
        
        .dashboard { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; align-items: start; }
        
        /* Vänster: Produktlista */
        .sidebar { background: var(--panel); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); height: calc(100vh - 150px); overflow-y: auto; }
        .product-item { background: var(--bg); border: 1px solid var(--border); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; transition: 0.2s; }
        .product-item:hover { border-color: var(--accent); }
        .prod-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .prod-title { font-weight: 800; font-size: 1.1rem; }
        .prod-stock { background: var(--border); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }
        .prod-stock.low { background: #7f1d1d; color: #fca5a5; }
        .action-btns { display: flex; gap: 0.5rem; margin-top: 1rem; }
        
        button { font-family: 'Inter', sans-serif; font-weight: 800; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-edit { background: var(--accent); color: white; padding: 0.5rem 1rem; flex: 1; }
        .btn-edit:hover { background: var(--accent-hover); }
        .btn-del { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 0.5rem 1rem; }
        .btn-del:hover { background: var(--danger); color: white; }
        .btn-new { background: var(--success); color: white; padding: 1rem; width: 100%; font-size: 1.1rem; margin-bottom: 1.5rem; }
        .btn-new:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }

        /* Höger: Formulär & Kod */
        .main-panel { display: flex; flex-direction: column; gap: 2rem; }
        .card { background: var(--panel); padding: 2rem; border-radius: 16px; border: 1px solid var(--border); }
        
        .form-title { color: var(--accent); margin-bottom: 1.5rem; font-weight: 900; font-size: 1.5rem; }
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
        
        input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 0.8rem 1rem; border-radius: 8px; font-family: inherit; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        input[type="color"] { padding: 0.2rem; height: 46px; cursor: pointer; }

        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 1rem; }
        .lang-box { background: var(--bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }
        .lang-box h3 { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 1.1rem; }
        
        .btn-save { background: var(--success); color: white; padding: 1.2rem; font-size: 1.2rem; width: 100%; margin-top: 2rem; }
        .btn-save:hover { filter: brightness(1.1); }

        /* Kod-område */
        .code-area { position: relative; }
        pre { background: #020617; color: #34d399; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; font-size: 0.9rem; line-height: 1.5; max-height: 300px; }
        .btn-copy { position: absolute; top: 1rem; right: 1rem; background: white; color: black; padding: 0.5rem 1rem; }

        @media (max-width: 1000px) { .dashboard { grid-template-columns: 1fr; } .sidebar { height: auto; max-height: 400px; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛠️ Crafters3D Dashboard</h1>
        <button class="btn-del" onclick="clearAll()">⚠️ Rensa hela databasen</button>
    </div>

    <div class="dashboard">
        
        <!-- VÄNSTER: PRODUKTLISTA -->
        <div class="sidebar">
            <button class="btn-new" onclick="startNew()">+ Skapa Ny Produkt</button>
            <div id="product-list">
                <!-- Genereras med JS -->
            </div>
        </div>

        <!-- HÖGER: FORMULÄR & KOD -->
        <div class="main-panel">
            
            <div class="card" id="form-card">
                <h2 class="form-title" id="form-title">✨ Skapar ny produkt</h2>
                
                <form id="prod-form">
                    <div class="grid-3">
                        <div class="form-group"><label>ID (Måste vara unikt!)</label><input type="text" id="p_id" placeholder="t.ex. prod_panda" required></div>
                        <div class="form-group"><label>Pris (SEK)</label><input type="number" id="p_price" required></div>
                        <div class="form-group"><label>Lagersaldo</label><input type="number" id="p_stock" value="5" required></div>
                    </div>

                    <div class="grid-3">
                        <div class="form-group"><label>Vikt (Gram)</label><input type="number" id="p_weight" value="100" required></div>
                        <div class="form-group"><label>Kategori</label>
                            <select id="p_cat">
                                <option value="Tools">Verktyg</option>
                                <option value="Mobs">Artefakter</option>
                                <option value="Decor">Inredning</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Temafärg (Hex)</label><input type="color" id="p_accent" value="#3b82f6"></div>
                    </div>

                    <div class="form-group"><label>Bild URL (Lämna tom för färg-bakgrund)</label><input type="text" id="p_image" placeholder="https://..."></div>

                    <div class="lang-grid">
                        <div class="lang-box" style="border-top: 4px solid #f59e0b;">
                            <h3>🇸🇪 Svenska</h3>
                            <div class="form-group"><label>Namn</label><input type="text" id="sv_name" required></div>
                            <div class="form-group"><label>Bricka (t.ex. NYHET)</label><input type="text" id="sv_badge"></div>
                            <div class="form-group"><label>Specifikation (t.ex. Vit PLA)</label><input type="text" id="sv_specs"></div>
                            <div class="form-group"><label>Beskrivning</label><textarea id="sv_desc" rows="3"></textarea></div>
                        </div>

                        <div class="lang-box" style="border-top: 4px solid #3b82f6;">
                            <h3>🇬🇧 English</h3>
                            <div class="form-group"><label>Name</label><input type="text" id="en_name" required></div>
                            <div class="form-group"><label>Badge (t.ex. NEW)</label><input type="text" id="en_badge"></div>
                            <div class="form-group"><label>Specs (t.ex. White PLA)</label><input type="text" id="en_specs"></div>
                            <div class="form-group"><label>Description</label><textarea id="en_desc" rows="3"></textarea></div>
                        </div>
                    </div>

                    <button type="submit" class="btn-save" id="btn-save">💾 Spara Produkt</button>
                </form>
            </div>

            <div class="card code-area">
                <button class="btn-copy" onclick="copyCode()">Kopiera Koden 📋</button>
                <h3 style="margin-bottom:1rem; color:var(--muted);">Klistra in detta i din index.html:</h3>
                <pre id="code-output">// Koden genereras här...</pre>
            </div>

        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('crafters_db')) || [];
        let isEditingMode = false; // Håller koll på om vi redigerar eller skapar ny

        const form = document.getElementById('prod-form');
        
        // --- RENDERA LISTAN TILL VÄNSTER ---
        const renderList = () => {
            const listEl = document.getElementById('product-list');
            
            if(db.length === 0) {
                listEl.innerHTML = `<p style="color:var(--muted); text-align:center; padding: 2rem 0;">Inga produkter än.</p>`;
            } else {
                listEl.innerHTML = db.map((p, i) => {
                    const stockClass = p.stock <= 3 ? 'low' : '';
                    return `
                    <div class="product-item">
                        <div class="prod-header">
                            <div class="prod-title"><span style="color:${p.accent}">●</span> ${p.sv.name}</div>
                            <div class="prod-stock ${stockClass}">${p.stock} st</div>
                        </div>
                        <div style="color:var(--muted); font-size:0.85rem; margin-bottom:0.5rem;">Pris: ${p.price} SEK | Kat: ${p.category}</div>
                        <div class="action-btns">
                            <button class="btn-edit" onclick="editProduct('${p.id}')">✏️ Redigera</button>
                            <button class="btn-del" onclick="deleteProduct('${p.id}')">✕</button>
                        </div>
                    </div>
                    `;
                }).join('');
            }
            
            generateCode();
            localStorage.setItem('crafters_db', JSON.stringify(db));
        };

        // --- SKAPA NY ---
        const startNew = () => {
            isEditingMode = false;
            form.reset();
            document.getElementById('p_id').readOnly = false; // Tillåt att skriva ID
            document.getElementById('form-title').innerHTML = "✨ Skapar ny produkt";
            document.getElementById('form-title').style.color = "var(--success)";
            document.getElementById('btn-save').innerHTML = "➕ Lägg till i databasen";
        };

        // --- REDIGERA EXISTERANDE ---
        const editProduct = (id) => {
            const prod = db.find(p => p.id === id);
            if(!prod) return;

            isEditingMode = true;
            document.getElementById('form-title').innerHTML = "✏️ Redigerar: " + prod.sv.name;
            document.getElementById('form-title').style.color = "var(--accent)";
            document.getElementById('btn-save').innerHTML = "💾 Spara ändringar";
            
            // Fyll formuläret
            document.getElementById('p_id').value = prod.id;
            document.getElementById('p_id').readOnly = true; // Lås ID så det inte ändras av misstag
            document.getElementById('p_price').value = prod.price;
            document.getElementById('p_stock').value = prod.stock;
            document.getElementById('p_weight').value = prod.weight;
            document.getElementById('p_cat').value = prod.category;
            document.getElementById('p_accent').value = prod.accent;
            document.getElementById('p_image').value = prod.image || '';

            document.getElementById('sv_name').value = prod.sv.name;
            document.getElementById('sv_badge').value = prod.sv.badge || '';
            document.getElementById('sv_specs').value = prod.sv.specs || '';
            document.getElementById('sv_desc').value = prod.sv.description || '';

            document.getElementById('en_name').value = prod.en.name;
            document.getElementById('en_badge').value = prod.en.badge || '';
            document.getElementById('en_specs').value = prod.en.specs || '';
            document.getElementById('en_desc').value = prod.en.description || '';

            window.scrollTo({ top: 0, behavior: 'smooth' }); // Scrolla upp till formuläret
        };

        // --- SPARA / UPPDATERA ---
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const prodData = {
                id: document.getElementById('p_id').value,
                price: Number(document.getElementById('p_price').value),
                weight: Number(document.getElementById('p_weight').value),
                stock: Number(document.getElementById('p_stock').value),
                image: document.getElementById('p_image').value,
                accent: document.getElementById('p_accent').value,
                category: document.getElementById('p_cat').value,
                en: {
                    name: document.getElementById('en_name').value,
                    badge: document.getElementById('en_badge').value,
                    specs: document.getElementById('en_specs').value,
                    description: document.getElementById('en_desc').value
                },
                sv: {
                    name: document.getElementById('sv_name').value,
                    badge: document.getElementById('sv_badge').value,
                    specs: document.getElementById('sv_specs').value,
                    description: document.getElementById('sv_desc').value
                }
            };

            if(isEditingMode) {
                // Hitta och ersätt
                const index = db.findIndex(p => p.id === prodData.id);
                if(index !== -1) db[index] = prodData;
            } else {
                // Kolla så ID inte redan finns
                if(db.find(p => p.id === prodData.id)) {
                    alert("Ett objekt med detta ID finns redan! Använd ett unikt ID.");
                    return;
                }
                db.push(prodData);
            }
            
            renderList();
            startNew(); // Återställ formuläret
        });

        // --- TA BORT ---
        const deleteProduct = (id) => {
            if(confirm("Är du säker på att du vill ta bort denna produkt?")) {
                db = db.filter(p => p.id !== id);
                renderList();
                if(document.getElementById('p_id').value === id) startNew();
            }
        };

        // --- RENSA ALLT ---
        const clearAll = () => {
            if(confirm("VARNING! Detta raderar ALLA produkter från din dator. Är du 100% säker?")) {
                db = [];
                renderList();
                startNew();
            }
        };

        // --- GENERERA OCH KOPIERA KOD ---
        const generateCode = () => {
            const codeStr = `let products = ` + JSON.stringify(db, null, 4) + `;`;
            document.getElementById('code-output').textContent = codeStr;
        };

        const copyCode = () => {
            navigator.clipboard.writeText(document.getElementById('code-output').textContent);
            alert("✅ Koden är kopierad! Öppna din index.html, markera din gamla let products = [...] och klistra in.");
        };

        // Start
        renderList();
        startNew();
    </script>
</body>
</html>
